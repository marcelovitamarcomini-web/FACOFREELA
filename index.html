<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <meta
      name="description"
      content="FacoFreela conecta clientes e freelancers em um diretorio profissional pesquisavel, moderno e acessivel."
    />
    <title>FacoFreela</title>
  </head>
  <body class="bg-slate-950">
    <div id="root">
      <div
        style="font-family: Inter, Arial, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; background: linear-gradient(180deg, #f8fbff 0%, #eef5ff 40%, #ffffff 100%); color: #0f172a;"
      >
        <div style="max-width: 720px; background: white; border: 1px solid rgba(148, 163, 184, 0.22); border-radius: 24px; padding: 32px; box-shadow: 0 20px 60px rgba(15, 23, 42, 0.12);">
          <p style="margin: 0 0 12px; font-size: 12px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: #2563eb;">
            FacoFreela
          </p>
          <h1 style="margin: 0 0 16px; font-size: 32px; line-height: 1.1;">
            Este arquivo nao deve ser aberto direto no navegador.
          </h1>
          <p style="margin: 0 0 12px; font-size: 16px; line-height: 1.7; color: #475569;">
            O projeto agora usa React + Vite. Se voce abrir so o <code>index.html</code>, o navegador nao compila o <code>src/main.tsx</code> e a pagina fica em branco.
          </p>
          <p style="margin: 0; font-size: 16px; line-height: 1.7; color: #475569;">
            Rode <code>npm run dev</code> no terminal e abra <code>http://localhost:5173</code>.
          </p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
