<!doctype html>
<html lang="pt-BR">
  <head>

    <meta
      name="viewport"

    />
    <link rel="icon" type="image/png" href="/logo.png?v=20260325" sizes="192x192" />
    <link rel="icon" href="/favicon.ico?v=20260325" sizes="any" />

    <link rel="apple-touch-icon" href="/logo.png?v=20260325" />
    <meta name="theme-color" content="#f5f5f7" />

      name="description"
      content="FaçoFreela conecta clientes a profissionais autônomos de diferentes áreas, do serviço local ao trabalho especializado."
    />
    <title>FaçoFreela</title>
  </head>
  <body class="bg-slate-950">
    <div id="root">
      <div
        style="font-family: Inter, Arial, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; background: #f5f5f7; color: #0f172a;"
      >
        <div style="max-width: 720px; background: white; border: 1px solid rgba(148, 163, 184, 0.22); border-radius: 24px; padding: 32px; box-shadow: 0 20px 60px rgba(15, 23, 42, 0.12);">
          <p style="margin: 0 0 12px; font-size: 12px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: #2563eb;">
            FaçoFreela
          </p>
          <h1 style="margin: 0 0 16px; font-size: 32px; line-height: 1.1;">

          </h1>
          <p style="margin: 0 0 12px; font-size: 16px; line-height: 1.7; color: #475569;">
            O projeto agora usa React + Vite. Se você abrir só o <code>index.html</code>, o navegador não compila o <code>src/main.tsx</code> e a página fica em branco.
          </p>
          <p style="margin: 0; font-size: 16px; line-height: 1.7; color: #475569;">
            Rode <code>npm run dev</code> no terminal e abra <code>http://localhost:5173</code>.
